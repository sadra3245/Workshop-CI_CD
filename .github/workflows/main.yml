name: Main CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Ditt befintliga jobb som bygger och testar
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: 'npm'
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test

  # Ditt nya jobb som sköter publiceringen
  deploy:
    runs-on: ubuntu-latest
    needs: build # Detta tvingar build att bli klar först!
    if: github.ref == 'refs/heads/main' # Körs bara om vi pushar till main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: 'npm'
      - run: npm ci
      - run: npm run build --if-present
      - name: Deploy to Netlify
        run: |
          npx netlify deploy --dir=build \
          --prod --auth="${{ secrets.NETLIFY_AUTH_TOKEN }}" \
          --site="${{ secrets.NETLIFY_SITE_ID }}"
